<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatrixFigs</title>

<link rel="icon" type="image/png"
href="https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --card: #ffffff;
    --text: #111;
    --muted: #666;
    --accent: #000;
}

body.dark {
    --bg: #0f0f12;
    --card: #1a1a1f;
    --text: #f2f2f2;
    --muted: #aaa;
    --accent: #ffffff;
}

body.space {
    --bg: radial-gradient(circle at 20% 30%, #1b2735, #090a0f);
    --card: rgba(255,255,255,0.05);
    --text: #ffffff;
    --muted: #cccccc;
    --accent: #7dd3fc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease;
}

.topbar {
    position: fixed;
    top: 20px;
    left: 20px;
}

select {
    padding: 8px 12px;
    border-radius: 8px;
    font-family: inherit;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 260px;
    padding: 60px 20px;
}

.item {
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.item:hover {
    transform: translateX(6px);
}

.item.active {
    background: var(--accent);
    color: var(--bg);
}

.main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
}

.product-display {
    max-width: 500px;
    background: var(--card);
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    text-align: center;
    animation: fadeIn 0.4s ease;
}

.product-display img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 20px;
    transition: transform 0.3s ease;
}

.product-display img:hover {
    transform: scale(1.05);
}

.price {
    font-weight: 600;
    font-size: 1.4rem;
    margin: 15px 0;
}

.purchase-btn {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s ease;
}

.purchase-btn:hover {
    opacity: 0.8;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="topbar">
<select onchange="changeTheme(this.value)">
<option value="">White</option>
<option value="dark">Dark</option>
<option value="space">Space</option>
</select>
</div>

<div class="container">

<div class="sidebar">
<div class="item active" onclick="showProduct(0)">Legit CFG</div>
<div class="item" onclick="showProduct(1)">Blatant</div>
<div class="item" onclick="showProduct(2)">Legit PREMIUM</div>
<div class="item" onclick="showProduct(3)">Rage</div>
</div>

<div class="main">
<div class="product-display" id="display"></div>
</div>

</div>

<script>
const products = [
{
name: "Legit CFG",
price: "$3.99",
desc: "High-quality Config That Stars Use",
img: "https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj",
link: "https://buy.stripe.com/00w5kD6RJ4WD1259haa7C00"
},
{
name: "Blatant",
price: "$3.99",
desc: "A simple but blatant camlock",
img: "https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj",
link: "https://buy.stripe.com/6oU00jfofgFl3ad9haa7C01"
},
{
name: "Legit PREMIUM",
price: "$5.99",
desc: "Never. Get caught",
img: "https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj",
link: "https://buy.stripe.com/aFa28rb7Zbl13adeBua7C02"
},
{
name: "Rage",
price: "$2.99",
desc: "A rage config",
img: "https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj",
link: "https://buy.stripe.com/9B600j2Btcp512564Ya7C03"
}
];

function showProduct(index){
const items=document.querySelectorAll(".item");
items.forEach(i=>i.classList.remove("active"));
items[index].classList.add("active");

document.getElementById("display").innerHTML=`
<img src="${products[index].img}">
<h1>${products[index].name}</h1>
<div class="price">${products[index].price}</div>
<p>${products[index].desc}</p>
<br>
<a href="${products[index].link}" target="_blank" class="purchase-btn">
Purchase
</a>
`;
}

function changeTheme(theme){
document.body.className = theme;
}

showProduct(0);
</script>

</body>
</html>
