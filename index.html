<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatrixFigs</title>

<link rel="icon" type="image/png"
href="https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: radial-gradient(circle at 20% 30%, #1a102d, #0a0614);
    --card: rgba(255,255,255,0.05);
    --text: #ffffff;
    --accent: #a855f7;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero img {
    width: 120px;
    border-radius: 20px;
    margin-bottom: 20px;
}

.hero h1 {
    font-size: 5rem;
    font-weight: 900;
    letter-spacing: 6px;
    text-shadow: 0 0 25px var(--accent);
}

.scroll-down {
    position: absolute;
    bottom: 40px;
    opacity: 0.7;
}

/* PRODUCTS */
.products {
    padding: 80px 40px 120px;
    max-width: 1200px;
    margin: auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

/* Beacon Animation */
.card {
    background: var(--card);
    padding: 24px;
    border-radius: 18px;
    text-align: center;
    backdrop-filter: blur(10px);
    opacity: 0;
    transform: translateY(30px) scale(0.9);
    transition: all 0.6s cubic-bezier(.17,.67,.38,1.3);
    box-shadow: 0 0 0 rgba(168,85,247,0);
}

.card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    box-shadow: 0 0 35px rgba(168,85,247,0.6);
}

.card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
}

.price {
    font-weight: 600;
    margin: 10px 0;
}

.btn {
    display: inline-block;
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- HERO SECTION -->
<section class="hero">
<img src="https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj">
<h1>MATRIX FIGS</h1>
<div class="scroll-down">Scroll Down ↓</div>
</section>

<!-- PRODUCTS SECTION -->
<section class="products">
<div class="grid" id="productGrid"></div>
</section>

<script>

    link: "https://buy.stripe.com/00w5kD6RJ4WD1259haa7C00"
},
{
    name: "Blatant",
    price: "$2.99",
    desc: "A blatant camlock",
    img: "https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj",
    link: "https://buy.stripe.com/6oU00jfofgFl3ad9haa7C01"
},
{
    name: "Offer 3",

    link: "https://buy.stripe.com/9B600j2Btcp512564Ya7C03"
},
{
    name: "TEST",
    price: "$7.99",
    desc: "TEST",
    img: "https://yt3.googleusercontent.com/Qe1yYuPJY-NGVfgK3n53ZfhUuZAF0fW-POyGNIOfZoUWD-XKDleBQkNX8tg2D4gpgAMiB_054Q=s900-c-k-c0x00ffffff-no-rj",

    link: "https://example.com/offer9"
}
];

const grid = document.getElementById("productGrid");

products.forEach(product => {
    grid.innerHTML += `
    <div class="card">
        <img src="${product.img}">
        <h2>${product.name}</h2>
        <div class="price">${product.price}</div>
        <p>${product.desc}</p>
        <br>
        <a href="${product.link}" target="_blank" class="btn">Purchase</a>
    </div>
    `;
});

const cards = document.querySelectorAll(".card");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        let index = [...cards].indexOf(entry.target);
        let group = Math.floor(index / 3);

        if (entry.isIntersecting) {
            setTimeout(() => {
                for (let i = group * 3; i < group * 3 + 3; i++) {
                    cards[i]?.classList.add("show");
                }
            }, group * 200);
        } else {
            for (let i = group * 3; i < group * 3 + 3; i++) {
                cards[i]?.classList.remove("show");
            }
        }
    });
}, { threshold: 0.05 });

cards.forEach(card => observer.observe(card));

</script>

</body>
</html>
